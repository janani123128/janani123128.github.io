<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropdown Navigation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Navbar */
.navbar{
    background:#0f172a;
    padding:15px 30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    color:#38bdf8;
    font-size:20px;
    font-weight:bold;
}

/* Menu */
.menu{
    list-style:none;
    display:flex;
    gap:20px;
}

.menu li{
    position:relative;
}

.menu a{
    color:#fff;
    text-decoration:none;
    padding:10px;
    display:block;
}

.menu a:hover{
    color:#38bdf8;
}

/* Dropdown */
.dropdown{
    position:absolute;
    top:40px;
    left:0;
    background:#1e293b;
    min-width:150px;
    border-radius:6px;
    display:none;
    flex-direction:column;
    overflow:hidden;
}

.dropdown a{
    padding:10px;
    color:#cbd5e1;
}

.dropdown a:hover{
    background:#2563eb;
    color:#fff;
}

/* Show dropdown on hover */
.menu li:hover .dropdown{
    display:flex;
}

/* Responsive */
@media(max-width:768px){
    .menu{
        flex-direction:column;
        gap:10px;
    }

    .dropdown{
        position:static;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">MySite</div>

    <ul class="menu">

        <li>
            <a href="#">Home</a>
        </li>

        <li>
            <a href="#">Services ▾</a>
            <div class="dropdown">
                <a href="#">Web Design</a>
                <a href="#">SEO</a>
                <a href="#">Marketing</a>
            </div>
        </li>

        <li>
            <a href="#">Products ▾</a>
            <div class="dropdown">
                <a href="#">UI Kits</a>
                <a href="#">Templates</a>
                <a href="#">Themes</a>
            </div>
        </li>

        <li>
            <a href="#">Contact</a>
        </li>

    </ul>
</div>

</body>
</html>

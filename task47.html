<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breadcrumb Navigation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    padding:40px;
}

/* Breadcrumb container */
.breadcrumb{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    background:#fff;
    padding:12px 15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    max-width:800px;
}

/* Links */
.breadcrumb a{
    text-decoration:none;
    color:#2563eb;
    font-size:14px;
}

/* Separator */
.breadcrumb span{
    margin:0 8px;
    color:#888;
}

/* Current page */
.breadcrumb .current{
    color:#555;
    font-weight:bold;
}

/* Hover */
.breadcrumb a:hover{
    text-decoration:underline;
}

/* Responsive */
@media(max-width:600px){
    .breadcrumb{
        font-size:12px;
        padding:10px;
    }
}
</style>
</head>
<body>

<!-- Breadcrumb -->
<div class="breadcrumb">

    <a href="#">Home</a>
    <span>›</span>

    <a href="#">Products</a>
    <span>›</span>

    <a href="#">Electronics</a>
    <span>›</span>

    <span class="current">Mobile Phones</span>

</div>

</body>
</html>

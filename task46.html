<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Navbar */
.navbar{
    background:#0f172a;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#38bdf8;
    font-size:20px;
    font-weight:bold;
}

/* Menu */
.menu{
    list-style:none;
    display:flex;
    gap:20px;
}

.menu li{
    position:relative;
}

.menu a{
    color:#fff;
    text-decoration:none;
    padding:10px;
    display:block;
}

/* Mega menu */
.mega{
    position:absolute;
    left:0;
    top:45px;
    width:600px;
    background:#1e293b;
    display:none;
    padding:20px;
    border-radius:8px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* Columns */
.mega-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.mega h4{
    color:#38bdf8;
    margin-bottom:10px;
}

.mega a{
    color:#cbd5e1;
    padding:5px 0;
    font-size:14px;
}

.mega a:hover{
    color:#fff;
}

/* Show mega menu on hover */
.menu li:hover .mega{
    display:block;
}

/* Responsive */
@media(max-width:768px){
    .menu{
        flex-direction:column;
    }

    .mega{
        position:static;
        width:100%;
    }

    .mega-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">MyStore</div>

    <ul class="menu">

        <li><a href="#">Home</a></li>

        <li>
            <a href="#">Products ▾</a>

            <div class="mega">
                <div class="mega-grid">

                    <div>
                        <h4>Electronics</h4>
                        <a href="#">Mobiles</a>
                        <a href="#">Laptops</a>
                        <a href="#">Cameras</a>
                    </div>

                    <div>
                        <h4>Fashion</h4>
                        <a href="#">Men</a>
                        <a href="#">Women</a>
                        <a href="#">Kids</a>
                    </div>

                    <div>
                        <h4>Home</h4>
                        <a href="#">Furniture</a>
                        <a href="#">Decor</a>
                        <a href="#">Kitchen</a>
                    </div>

                </div>
            </div>

        </li>

        <li><a href="#">Deals</a></li>
        <li><a href="#">Contact</a></li>

    </ul>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Email</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f4f4f4;
    font-family:Arial,sans-serif;
}

.email-container{
    max-width:600px;
    margin:20px auto;
    background:#ffffff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:30px 20px;
}

.header h1{
    margin:0;
}

.content{
    padding:30px;
    color:#333;
    line-height:1.6;
}

.button{
    display:inline-block;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:5px;
    margin-top:15px;
}

.footer{
    background:#f1f5f9;
    text-align:center;
    padding:20px;
    color:#666;
    font-size:14px;
}

@media(max-width:600px){
    .content{
        padding:20px;
    }

    .header{
        padding:20px;
    }
}
</style>
</head>
<body>

<div class="email-container">

    <div class="header">
        <h1>JananiTech</h1>
        <p>Welcome to Our Newsletter</p>
    </div>

    <div class="content">
        <h2>Hello User 👋</h2>

        <p>
            Thank you for subscribing to JananiTech.
            Stay updated with the latest technology news,
            tutorials, and exciting updates.
        </p>

        <p>
            Click the button below to explore our latest content.
        </p>

        <a href="#" class="button">Read More</a>
    </div>

    <div class="footer">
        © 2026 JananiTech | All Rights Reserved
    </div>

</div>

</body>
</html>

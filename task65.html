<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Story UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Story container */
.stories{
    display:flex;
    gap:15px;
    padding:20px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
    overflow-x:auto;
    max-width:90%;
}

/* Hide scrollbar */
.stories::-webkit-scrollbar{
    display:none;
}

/* Single story */
.story{
    text-align:center;
    min-width:70px;
}

/* Gradient ring */
.story-ring{
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:5px;
    padding:3px;
}

/* Inner avatar */
.story-ring img,
.story-ring .avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-weight:bold;
    font-size:14px;
}

/* Username */
.story p{
    font-size:12px;
    color:#333;
}
</style>
</head>
<body>

<!-- Stories -->
<div class="stories">

    <div class="story">
        <div class="story-ring">
            <div class="avatar">A</div>
        </div>
        <p>Alex</p>
    </div>

    <div class="story">
        <div class="story-ring">
            <div class="avatar">B</div>
        </div>
        <p>Ben</p>
    </div>

    <div class="story">
        <div class="story-ring">
            <div class="avatar">C</div>
        </div>
        <p>Chris</p>
    </div>

    <div class="story">
        <div class="story-ring">
            <div class="avatar">D</div>
        </div>
        <p>Diana</p>
    </div>

    <div class="story">
        <div class="story-ring">
            <div class="avatar">E</div>
        </div>
        <p>Emma</p>
    </div>

</div>

</body>
</html>

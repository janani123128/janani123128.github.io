<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    background:#f4f7fc;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:250px;
    background:#0f172a;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
}

/* Logo */
.sidebar h2{
    color:#38bdf8;
    margin-bottom:30px;
    text-align:center;
}

/* Menu Links */
.menu a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:12px;
    margin-bottom:8px;
    border-radius:6px;
    transition:0.3s;
}

.menu a:hover{
    background:#1e293b;
    color:#fff;
}

/* Active link */
.menu a.active{
    background:#2563eb;
    color:#fff;
}

/* Main content */
.main{
    flex:1;
    padding:20px;
}

.main h1{
    color:#2563eb;
}

/* Responsive */
@media(max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        flex-direction:row;
        overflow-x:auto;
    }
    .menu{
        display:flex;
        gap:10px;
    }
    .menu a{
        white-space:nowrap;
    }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>MyPanel</h2>

    <div class="menu">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Analytics</a>
        <a href="#">Messages</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </div>
</div>

<!-- Main Content -->
<div class="main">
    <h1>Dashboard Content</h1>
    <p>This is a simple sidebar layout UI.</p>
</div>

</body>
</html>

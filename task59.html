<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Banner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

/* Banner */
.banner{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#fff;
    background:linear-gradient(-45deg,#2563eb,#9333ea,#10b981,#f59e0b);
    background-size:400% 400%;
    animation:gradientBG 8s ease infinite;
}

/* Background animation */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Title animation */
.banner h1{
    font-size:3rem;
    margin-bottom:10px;
    animation:fadeDown 1s ease forwards;
    opacity:0;
}

.banner p{
    font-size:1.2rem;
    margin-bottom:20px;
    animation:fadeUp 1.2s ease forwards;
    opacity:0;
}

/* Button */
.btn{
    padding:12px 20px;
    background:#fff;
    color:#2563eb;
    border-radius:5px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
    animation:fadeUp 1.4s ease forwards;
    opacity:0;
}

.btn:hover{
    transform:scale(1.05);
}

/* Animations */
@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Responsive */
@media(max-width:768px){
    .banner h1{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">
    <h1>Welcome to Our Website</h1>
    <p>Creative Animated Banner UI with smooth effects</p>
    <a href="#" class="btn">Get Started</a>
</div>

</body>
</html>

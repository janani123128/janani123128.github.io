<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#9333ea,#06b6d4);
    overflow:hidden;
}

/* Background blur circles */
.circle{
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    filter:blur(60px);
}

.circle1{
    top:50px;
    left:50px;
}

.circle2{
    bottom:80px;
    right:80px;
}

/* Glass container */
.glass{
    width:90%;
    max-width:900px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
}

/* Glass card */
.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border-radius:15px;
    padding:20px;
    color:#fff;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,0.25);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    font-size:14px;
    opacity:0.9;
}

/* Header glass box */
.header{
    grid-column:1/-1;
    text-align:center;
    padding:30px;
    font-size:24px;
    font-weight:bold;
}

/* Button */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:rgba(255,255,255,0.3);
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.btn:hover{
    background:rgba(255,255,255,0.5);
}
</style>
</head>
<body>

<!-- Background effects -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- Glass layout -->
<div class="glass">

    <div class="card header">
        Glassmorphism UI Design
    </div>

    <div class="card">
        <h3>Dashboard</h3>
        <p>Modern glass style admin dashboard layout.</p>
        <a href="#" class="btn">View</a>
    </div>

    <div class="card">
        <h3>Analytics</h3>
        <p>Beautiful blurred UI for data visualization.</p>
        <a href="#" class="btn">View</a>
    </div>

    <div class="card">
        <h3>Settings</h3>
        <p>Clean glass interface for control panels.</p>
        <a href="#" class="btn">View</a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    padding:20px;
}

/* Title */
h1{
    text-align:center;
    margin-bottom:20px;
    color:#2563eb;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
    max-width:1000px;
    margin:auto;
}

/* Image Box */
.img-box{
    height:180px;
    background:#ddd;
    border-radius:10px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.img-box:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Overlay Text */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.5);
    color:#fff;
    padding:10px;
    font-size:14px;
    text-align:center;
}

/* Responsive */
@media(max-width:600px){
    .img-box{
        height:140px;
    }
}
</style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">

    <div class="img-box">
        <div class="overlay">Image 1</div>
    </div>

    <div class="img-box">
        <div class="overlay">Image 2</div>
    </div>

    <div class="img-box">
        <div class="overlay">Image 3</div>
    </div>

    <div class="img-box">
        <div class="overlay">Image 4</div>
    </div>

    <div class="img-box">
        <div class="overlay">Image 5</div>
    </div>

    <div class="img-box">
        <div class="overlay">Image 6</div>
    </div>

</div>

</body>
</html>

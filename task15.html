<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Page</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#fff;
    padding:25px;
    width:320px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#4f46e5;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4f46e5;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}

p{
    text-align:center;
    font-size:14px;
}
a{
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="box">
    <h2>Sign Up</h2>

    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="#">Login</a></p>
</div>

</body>
</html>

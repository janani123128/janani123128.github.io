<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Post UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Post Card */
.post{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
    overflow:hidden;
}

/* Header */
.post-header{
    display:flex;
    align-items:center;
    padding:15px;
    gap:10px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.user-info h4{
    font-size:14px;
}

.user-info p{
    font-size:12px;
    color:#666;
}

/* Image */
.post-img{
    width:100%;
    height:220px;
    background:linear-gradient(135deg,#2563eb,#9333ea);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:14px;
}

/* Actions */
.actions{
    display:flex;
    justify-content:space-around;
    padding:10px;
    border-top:1px solid #eee;
}

.actions button{
    background:none;
    border:none;
    cursor:pointer;
    font-size:14px;
    color:#333;
    transition:0.3s;
}

.actions button:hover{
    color:#2563eb;
}

/* Caption */
.caption{
    padding:15px;
    font-size:14px;
    color:#444;
}

.caption span{
    font-weight:bold;
}
</style>
</head>
<body>

<div class="post">

    <!-- Header -->
    <div class="post-header">
        <div class="avatar">A</div>
        <div class="user-info">
            <h4>Alex Johnson</h4>
            <p>2 hrs ago</p>
        </div>
    </div>

    <!-- Image -->
    <div class="post-img">
        Post Image / Media
    </div>

    <!-- Actions -->
    <div class="actions">
        <button>👍 Like</button>
        <button>💬 Comment</button>
        <button>🔗 Share</button>
    </div>

    <!-- Caption -->
    <div class="caption">
        <span>Alex:</span> This is a beautiful social media post UI design.
    </div>

</div>

</body>
</html>

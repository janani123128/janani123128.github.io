<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Modal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Hide checkbox */
#openModal{
    display:none;
}

/* Button */
.open-btn{
    padding:12px 20px;
    background:#2563eb;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

/* Modal background */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

/* Modal box */
.modal-content{
    background:#fff;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:10px;
    text-align:center;
    position:relative;
    box-shadow:0 2px 15px rgba(0,0,0,0.2);
}

/* Close button */
.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:18px;
    cursor:pointer;
}

/* Show modal when checked */
#openModal:checked ~ .modal{
    display:flex;
}

.modal h2{
    color:#2563eb;
    margin-bottom:10px;
}

.modal p{
    font-size:14px;
    color:#555;
}
</style>
</head>
<body>

<!-- Open Button -->
<label for="openModal" class="open-btn">Open Modal</label>

<!-- Checkbox -->
<input type="checkbox" id="openModal">

<!-- Modal -->
<div class="modal">

    <div class="modal-content">
        <label for="openModal" class="close-btn">✖</label>
        <h2>Welcome!</h2>
        <p>This is a simple popup modal using HTML and CSS only.</p>
    </div>

</div>

</body>
</html>

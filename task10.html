<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonials</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

.testimonials{
    padding:50px 20px;
    text-align:center;
}

.testimonials h2{
    margin-bottom:30px;
    color:#333;
}

.testimonial-container{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#fff;
    width:280px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card p{
    color:#555;
    line-height:1.6;
    margin-bottom:15px;
}

.card h4{
    color:#2563eb;
}
</style>
</head>
<body>

<section class="testimonials">
    <h2>What Our Clients Say</h2>

    <div class="testimonial-container">

        <div class="card">
            <p>"Excellent service and professional support. Highly recommended!"</p>
            <h4>John Doe</h4>
        </div>

        <div class="card">
            <p>"The team delivered our project on time with great quality."</p>
            <h4>Sarah Smith</h4>
        </div>

        <div class="card">
            <p>"Amazing experience working with them. Very satisfied."</p>
            <h4>Michael Lee</h4>
        </div>

    </div>
</section>

</body>
</html>

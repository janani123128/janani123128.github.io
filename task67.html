<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Thumbnail container */
.thumbnail{
    width:560px;
    height:315px;
    background:linear-gradient(135deg,#ff0000,#cc0000);
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px;
}

/* Left text section */
.text{
    color:#fff;
    z-index:2;
    max-width:60%;
}

.text h1{
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
    margin-bottom:10px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.4);
}

.text p{
    font-size:14px;
    opacity:0.9;
}

/* Right image placeholder */
.image{
    width:140px;
    height:140px;
    background:#fff;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:#cc0000;
    z-index:2;
}

/* Play button */
.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(5px);
}

.play::after{
    content:"";
    width:0;
    height:0;
    border-left:18px solid #fff;
    border-top:12px solid transparent;
    border-bottom:12px solid transparent;
    margin-left:5px;
}

/* Decorative glow */
.glow{
    position:absolute;
    width:200px;
    height:200px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    top:-50px;
    right:-50px;
}
</style>
</head>
<body>

<div class="thumbnail">

    <div class="glow"></div>

    <div class="text">
        <h1>Learn HTML & CSS</h1>
        <p>Build modern websites in just 10 minutes!</p>
    </div>

    <div class="image">
        IMAGE
    </div>

    <div class="play"></div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Section</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Parallax sections */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:bold;
    color:#fff;
    text-align:center;
}

/* Parallax background */
.parallax{
    background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
    background-attachment:fixed;
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;
}

/* Overlay content */
.overlay{
    background:rgba(0,0,0,0.5);
    padding:20px 30px;
    border-radius:10px;
}

/* Normal sections */
.sec2{
    background:#2563eb;
}

.sec3{
    background:#10b981;
}

/* Responsive fix for mobile (parallax disabled on many phones) */
@media(max-width:768px){
    .parallax{
        background-attachment:scroll;
    }
}
</style>
</head>
<body>

<!-- Parallax Hero -->
<div class="section parallax">
    <div class="overlay">
        Parallax Hero Section
    </div>
</div>

<!-- Content Section -->
<div class="section sec2">
    About Section
</div>

<!-- Content Section -->
<div class="section sec3">
    Services Section
</div>

</body>
</html>

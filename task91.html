<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Icon Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

/* grid */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:20px;
    max-width:700px;
}

/* icon base */
.icon{
    width:140px;
    height:140px;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    color:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
}

/* gradient styles */
.icon1{
    background:linear-gradient(135deg,#2563eb,#9333ea);
}

.icon2{
    background:linear-gradient(135deg,#10b981,#2563eb);
}

.icon3{
    background:linear-gradient(135deg,#f59e0b,#ef4444);
}

/* glass effect */
.icon4{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.2);
    color:#111827;
}

/* shine effect */
.icon::after{
    content:"";
    position:absolute;
    top:-40%;
    left:-40%;
    width:80%;
    height:180%;
    background:rgba(255,255,255,0.2);
    transform:rotate(25deg);
    animation:shine 3s infinite;
}

@keyframes shine{
    0%{ left:-80%; }
    50%{ left:120%; }
    100%{ left:120%; }
}

/* label */
label{
    display:block;
    text-align:center;
    margin-top:8px;
    font-size:12px;
    color:#6b7280;
}
</style>
</head>
<body>

<div class="container">

    <div>
        <div class="icon icon1">A</div>
        <label>Gradient Blue</label>
    </div>

    <div>
        <div class="icon icon2">B</div>
        <label>Green Blue</label>
    </div>

    <div>
        <div class="icon icon3">C</div>
        <label>Sunset Style</label>
    </div>

    <div>
        <div class="icon icon4">D</div>
        <label>Glass Style</label>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#111827;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    color:#3b82f6;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:10px;
    margin-bottom:8px;
    border-radius:5px;
}

.sidebar a:hover{
    background:#1f2937;
}

/* Main */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* Header */
.header{
    background:#fff;
    padding:15px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
}

/* Content */
.content{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.box{
    background:#f3f4f6;
    padding:20px;
    text-align:center;
    border-radius:8px;
}

/* Responsive */
@media (max-width: 768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        text-align:center;
    }

    .content{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Logo</h2>
    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#">Settings</a>
    <a href="#">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h3>Dashboard</h3>
        <span>User</span>
    </div>

    <div class="content">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>

</div>

</body>
</html>

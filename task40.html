<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Slider Container */
.slider{
    width:80%;
    max-width:700px;
    overflow:hidden;
    border-radius:10px;
    box-shadow:0 2px 15px rgba(0,0,0,0.2);
}

/* Slides Wrapper */
.slides{
    display:flex;
    width:300%;
    transition:0.5s;
}

/* Each Slide */
.slide{
    width:100%;
    height:300px;
    flex-shrink:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    color:#fff;
}

.s1{ background:#2563eb; }
.s2{ background:#ef4444; }
.s3{ background:#10b981; }

/* Hide radio buttons */
input{
    display:none;
}

/* Navigation */
.nav{
    text-align:center;
    margin-top:10px;
}

.nav label{
    display:inline-block;
    width:12px;
    height:12px;
    background:#ccc;
    border-radius:50%;
    margin:5px;
    cursor:pointer;
}

/* Slide control */
#r1:checked ~ .slider .slides{
    transform:translateX(0%);
}

#r2:checked ~ .slider .slides{
    transform:translateX(-100%);
}

#r3:checked ~ .slider .slides{
    transform:translateX(-200%);
}

/* Active dot */
#r1:checked ~ .nav label[for="r1"],
#r2:checked ~ .nav label[for="r2"],
#r3:checked ~ .nav label[for="r3"]{
    background:#2563eb;
}
</style>
</head>
<body>

<!-- Radio Buttons -->
<input type="radio" name="slider" id="r1" checked>
<input type="radio" name="slider" id="r2">
<input type="radio" name="slider" id="r3">

<!-- Slider -->
<div class="slider">
    <div class="slides">
        <div class="slide s1">Slide 1</div>
        <div class="slide s2">Slide 2</div>
        <div class="slide s3">Slide 3</div>
    </div>
</div>

<!-- Navigation Dots -->
<div class="nav">
    <label for="r1"></label>
    <label for="r2"></label>
    <label for="r3"></label>
</div>

</body>
</html>

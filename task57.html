<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrolling Effect UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#f4f7fc;
}

/* Navbar */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0f172a;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:15px;
}

nav a:hover{
    color:#38bdf8;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:bold;
    color:#fff;
}

/* Different backgrounds */
.sec1{ background:linear-gradient(135deg,#2563eb,#60a5fa); }
.sec2{ background:linear-gradient(135deg,#10b981,#34d399); }
.sec3{ background:linear-gradient(135deg,#f59e0b,#fbbf24); }
.sec4{ background:linear-gradient(135deg,#ef4444,#f87171); }

/* Scroll reveal animation */
.reveal{
    opacity:0;
    transform:translateY(50px);
    animation:fadeUp 1s ease forwards;
}

/* Delay effect */
.sec2 .reveal{ animation-delay:0.2s; }
.sec3 .reveal{ animation-delay:0.4s; }
.sec4 .reveal{ animation-delay:0.6s; }

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav>
    <div style="color:#38bdf8;font-weight:bold;">ScrollUI</div>
    <div>
        <a href="#s1">Home</a>
        <a href="#s2">About</a>
        <a href="#s3">Services</a>
        <a href="#s4">Contact</a>
    </div>
</nav>

<!-- Sections -->
<section id="s1" class="sec1">
    <div class="reveal">Home Section</div>
</section>

<section id="s2" class="sec2">
    <div class="reveal">About Section</div>
</section>

<section id="s3" class="sec3">
    <div class="reveal">Services Section</div>
</section>

<section id="s4" class="sec4">
    <div class="reveal">Contact Section</div>
</section>

</body>
</html>

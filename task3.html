<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage Wireframe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    color:#555;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* Wireframe Blocks */
.wire-box{
    background:#ddd;
    border:2px dashed #999;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#666;
}

/* Header */
header{
    background:#fff;
    padding:20px 0;
    border-bottom:2px solid #ccc;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    width:120px;
    height:50px;
}

.menu{
    display:flex;
    gap:15px;
}

.menu div{
    width:80px;
    height:35px;
}

/* Hero */
.hero{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    padding:60px 0;
}

.hero-text{
    height:300px;
}

.hero-image{
    height:300px;
}

/* Features */
.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin:40px 0;
}

.feature{
    height:180px;
}

/* About */
.about{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin:40px 0;
}

.about-image,
.about-content{
    height:250px;
}

/* Testimonials */
.testimonials{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin:40px 0;
}

.testimonial{
    height:150px;
}

/* CTA */
.cta{
    height:180px;
    margin:40px 0;
}

/* Footer */
footer{
    padding:30px 0;
}

.footer{
    height:120px;
}

/* Responsive */
@media (max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .menu{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero,
    .about,
    .features,
    .testimonials{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<!-- Header -->
<header>
    <div class="container navbar">
        <div class="wire-box logo">LOGO</div>

        <div class="menu">
            <div class="wire-box">Home</div>
            <div class="wire-box">About</div>
            <div class="wire-box">Services</div>
            <div class="wire-box">Contact</div>
        </div>
    </div>
</header>

<!-- Hero Section -->
<section class="container hero">
    <div class="wire-box hero-text">
        HERO TEXT / HEADLINE / CTA
    </div>

    <div class="wire-box hero-image">
        HERO IMAGE
    </div>
</section>

<!-- Features -->
<section class="container features">
    <div class="wire-box feature">FEATURE 1</div>
    <div class="wire-box feature">FEATURE 2</div>
    <div class="wire-box feature">FEATURE 3</div>
</section>

<!-- About -->
<section class="container about">
    <div class="wire-box about-image">ABOUT IMAGE</div>
    <div class="wire-box about-content">ABOUT CONTENT</div>
</section>

<!-- Testimonials -->
<section class="container testimonials">
    <div class="wire-box testimonial">TESTIMONIAL 1</div>
    <div class="wire-box testimonial">TESTIMONIAL 2</div>
    <div class="wire-box testimonial">TESTIMONIAL 3</div>
</section>

<!-- Call To Action -->
<section class="container">
    <div class="wire-box cta">
        CALL TO ACTION SECTION
    </div>
</section>

<!-- Footer -->
<footer class="container">
    <div class="wire-box footer">
        FOOTER (Links, Social Icons, Copyright)
    </div>
</footer>

</body>
</html>

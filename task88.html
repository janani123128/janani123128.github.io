<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Flow Wireframe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
    padding:30px;
}

/* container */
.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#111827;
}

/* flow row */
.flow{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

/* wireframe screen */
.screen{
    width:200px;
    height:360px;
    background:#fff;
    border:2px dashed #9ca3af;
    border-radius:12px;
    padding:10px;
    position:relative;
}

/* placeholder blocks */
.bar{
    width:100%;
    height:20px;
    background:#e5e7eb;
    margin-bottom:10px;
    border-radius:4px;
}

.big{
    height:80px;
}

.btn{
    width:70%;
    height:30px;
    background:#d1d5db;
    margin:10px auto;
    border-radius:6px;
}

.text{
    height:12px;
    background:#e5e7eb;
    margin:6px 0;
    border-radius:4px;
}

/* label */
.label{
    position:absolute;
    top:-10px;
    left:10px;
    background:#111827;
    color:#fff;
    font-size:11px;
    padding:3px 6px;
    border-radius:4px;
}

/* arrow */
.arrow{
    font-size:30px;
    color:#6b7280;
}

/* section title */
.sub{
    text-align:center;
    margin-bottom:20px;
    color:#6b7280;
    font-size:14px;
}

/* responsive */
@media(max-width:900px){
    .flow{
        flex-direction:column;
    }
    .arrow{
        transform:rotate(90deg);
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>User Flow Wireframe</h1>
    <div class="sub">Login → Dashboard → Product → Checkout Flow</div>

    <div class="flow">

        <!-- LOGIN -->
        <div class="screen">
            <div class="label">Login</div>
            <div class="bar"></div>
            <div class="big bar"></div>
            <div class="text"></div>
            <div class="text"></div>
            <div class="btn"></div>
            <div class="btn"></div>
        </div>

        <div class="arrow">→</div>

        <!-- DASHBOARD -->
        <div class="screen">
            <div class="label">Dashboard</div>
            <div class="bar"></div>
            <div class="big bar"></div>
            <div class="text"></div>
            <div class="text"></div>
            <div class="btn"></div>
        </div>

        <div class="arrow">→</div>

        <!-- PRODUCT -->
        <div class="screen">
            <div class="label">Product</div>
            <div class="bar"></div>
            <div class="big bar"></div>
            <div class="text"></div>
            <div class="btn"></div>
            <div class="btn"></div>
        </div>

        <div class="arrow">→</div>

        <!-- CHECKOUT -->
        <div class="screen">
            <div class="label">Checkout</div>
            <div class="bar"></div>
            <div class="text"></div>
            <div class="text"></div>
            <div class="btn"></div>
            <div class="btn"></div>
            <div class="btn"></div>
        </div>

    </div>

</div>

</body>
</html>

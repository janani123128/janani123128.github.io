<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#06b6d4,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#fff;
    padding:25px;
    width:320px;
    border-radius:10px;
    text-align:center;
}

h2{
    color:#2563eb;
    margin-bottom:10px;
}

p{
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

a{
    display:block;
    margin-top:10px;
    font-size:14px;
    color:#2563eb;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="box">
    <h2>Forgot Password</h2>
    <p>Enter your email to reset your password</p>

    <form>
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Send Reset Link</button>
    </form>

    <a href="#">Back to Login</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services Section</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.services{
    padding:60px 20px;
    text-align:center;
}

.services h2{
    margin-bottom:40px;
    color:#333;
}

.service-container{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.service-box{
    background:#fff;
    width:250px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.service-box h3{
    color:#2563eb;
    margin-bottom:15px;
}

.service-box p{
    color:#666;
    line-height:1.5;
}
</style>
</head>
<body>

<section class="services">
    <h2>Our Services</h2>

    <div class="service-container">

        <div class="service-box">
            <h3>Web Design</h3>
            <p>Create modern and responsive website designs.</p>
        </div>

        <div class="service-box">
            <h3>Development</h3>
            <p>Build fast and secure web applications.</p>
        </div>

        <div class="service-box">
            <h3>SEO</h3>
            <p>Improve website visibility on search engines.</p>
        </div>

    </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Advertisement</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Banner */
.banner{
    width:90%;
    max-width:900px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(135deg,#2563eb,#9333ea);
    color:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Content */
.content{
    padding:30px;
    flex:1;
}

.content h1{
    font-size:2rem;
    margin-bottom:10px;
}

.content p{
    font-size:14px;
    margin-bottom:15px;
    opacity:0.9;
}

/* Button */
.btn{
    display:inline-block;
    padding:10px 15px;
    background:#fff;
    color:#2563eb;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* Image box */
.image{
    flex:1;
    min-height:200px;
    background:rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}

/* Responsive */
@media(max-width:768px){
    .banner{
        flex-direction:column;
        text-align:center;
    }

    .image{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="banner">

    <div class="content">
        <h1>Big Sale 50% OFF</h1>
        <p>Grab the best deals on our products today. Limited time offer!</p>
        <a href="#" class="btn">Shop Now</a>
    </div>

    <div class="image">
        Banner Image
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphism Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e0e5ec;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Container */
.container{
    width:90%;
    max-width:900px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
}

/* Neumorphism Card */
.card{
    background:#e0e5ec;
    padding:25px;
    border-radius:20px;
    box-shadow:8px 8px 15px #a3b1c6,
               -8px -8px 15px #ffffff;
    transition:0.3s;
}

.card:hover{
    box-shadow:inset 6px 6px 10px #a3b1c6,
               inset -6px -6px 10px #ffffff;
}

.card h3{
    margin-bottom:10px;
    color:#333;
}

.card p{
    font-size:14px;
    color:#555;
}

/* Button */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    border-radius:12px;
    text-decoration:none;
    color:#333;
    box-shadow:6px 6px 10px #a3b1c6,
               -6px -6px 10px #ffffff;
    transition:0.3s;
}

.btn:active{
    box-shadow:inset 4px 4px 8px #a3b1c6,
               inset -4px -4px 8px #ffffff;
}

/* Header */
.header{
    grid-column:1/-1;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    padding:20px;
    border-radius:20px;
    box-shadow:6px 6px 10px #a3b1c6,
               -6px -6px 10px #ffffff;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        Neumorphism UI Layout
    </div>

    <div class="card">
        <h3>Dashboard</h3>
        <p>Soft UI design for modern dashboards.</p>
        <a href="#" class="btn">Open</a>
    </div>

    <div class="card">
        <h3>Analytics</h3>
        <p>Clean depth-based UI for data insights.</p>
        <a href="#" class="btn">Open</a>
    </div>

    <div class="card">
        <h3>Settings</h3>
        <p>Minimal soft interface controls.</p>
        <a href="#" class="btn">Open</a>
    </div>

</div>

</body>
</html>

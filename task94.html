<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#2563eb;
    margin-bottom:10px;
}

.value{
    font-size:28px;
    font-weight:bold;
    color:#111827;
}

.chat-box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="header">
    <h1>🤖 AI Dashboard</h1>
</div>

<div class="dashboard">

    <div class="card">
        <h3>Total Users</h3>
        <div class="value">12,540</div>
    </div>

    <div class="card">
        <h3>AI Requests</h3>
        <div class="value">48,320</div>
    </div>

    <div class="card">
        <h3>Accuracy</h3>
        <div class="value">98%</div>
    </div>

    <div class="card">
        <h3>Active Bots</h3>
        <div class="value">24</div>
    </div>

</div>

<div class="chat-box">
    <h2>AI Assistant</h2>
    <input type="text" placeholder="Ask AI something...">
    <button>Send</button>
</div>

</body>
</html>

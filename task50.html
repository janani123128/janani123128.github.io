<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* Spinner */
.loader{
    width:60px;
    height:60px;
    border:6px solid #e5e7eb;
    border-top:6px solid #2563eb;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

/* Animation */
@keyframes spin{
    0%{
        transform:rotate(0deg);
    }
    100%{
        transform:rotate(360deg);
    }
}

/* Text */
.text{
    margin-top:15px;
    color:#555;
    font-size:14px;
    letter-spacing:1px;
}

/* Dots loader (optional style) */
.dots{
    margin-top:20px;
    display:flex;
    gap:5px;
}

.dots span{
    width:8px;
    height:8px;
    background:#2563eb;
    border-radius:50%;
    animation:bounce 1s infinite ease-in-out;
}

.dots span:nth-child(2){
    animation-delay:0.2s;
}

.dots span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
        opacity:0.4;
    }
    50%{
        transform:translateY(-8px);
        opacity:1;
    }
}
</style>
</head>
<body>

<!-- Spinner Loader -->
<div class="loader"></div>
<div class="text">Loading...</div>

<!-- Optional Dots Loader -->
<div class="dots">
    <span></span>
    <span></span>
    <span></span>
</div>

</body>
</html>

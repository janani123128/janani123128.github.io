<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Banner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

.hero{
    height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed,#ec4899);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.hero-content{
    z-index:2;
}

.hero h1{
    font-size:70px;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:white;
    color:#2563eb;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

/* Floating Circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:float 6s infinite ease-in-out;
}

.circle1{
    width:250px;
    height:250px;
    top:10%;
    left:5%;
}

.circle2{
    width:180px;
    height:180px;
    bottom:10%;
    right:10%;
}

.circle3{
    width:120px;
    height:120px;
    top:20%;
    right:25%;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-25px);
    }
}

@media(max-width:768px){

.hero h1{
    font-size:42px;
}

.hero p{
    font-size:18px;
}

}
</style>
</head>
<body>

<section class="hero">

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <div class="hero-content">
        <h1>JananiTech</h1>

        <p>
            Designing Modern Digital Experiences
            with Creativity and Innovation
        </p>

        <a href="#" class="btn">Get Started</a>
    </div>

</section>

</body>
</html>
